<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إضافة دواء جديد - ClinicPro</title>

                        "on-secondary-fixed-variant": "#00513a",
                        "tertiary-fixed": "#ffddb4",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eff1f4",
                        "danger-bg": "#FEE2E2",
                        "on-tertiary-fixed-variant": "#633f00",

                        "on-secondary-fixed": "#002115",

                    },
                    "borderRadius": {

<style>
        .input-radius { border-radius: 10px; }
        .btn-radius { border-radius: 12px; }
        .sheet-shadow { box-shadow: 0 -4px 24px rgba(0,0,0,0.12); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-text-primary antialiased relative overflow-hidden">
<!-- App Canvas Placeholder -->
<div class="p-md opacity-30">
<div class="h-64 bg-surface-container-low rounded-xl mb-md"></div>
<div class="h-32 bg-surface-container-low rounded-xl mb-md"></div>
<div class="h-32 bg-surface-container-low rounded-xl"></div>
</div>
<!-- Overlay Background -->
<div class="fixed inset-0 bg-black/40 z-40 transition-opacity duration-300" id="sheet-overlay"></div>
<!-- Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 w-full md:max-w-[480px] md:mx-auto bg-surface rounded-t-[24px] z-50 sheet-shadow flex flex-col transform transition-transform duration-300 translate-y-0" id="bottom-sheet" style="max-height: 90vh;">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2 cursor-grab active:cursor-grabbing">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="flex items-center justify-between px-md pb-md border-b border-border">
<h2 class="font-headline-md text-headline-md text-on-surface">إضافة دواء جديد</h2>
<button class="p-2 text-text-secondary hover:bg-surface-container-low rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Content/Form Scrollable Area -->
<div class="p-md overflow-y-auto flex-1 flex flex-col gap-lg">
<!-- Trade Name Input -->
<div class="flex flex-col gap-sm">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="trade-name">الاسم التجاري</label>
<input class="input-radius border-border focus:border-primary focus:ring-1 focus:ring-primary w-full p-3 font-body-md text-body-md bg-surface text-on-surface placeholder:text-text-hint transition-colors outline-none shadow-sm" id="trade-name" placeholder="أدخل الاسم التجاري (مثل: بنادول)" type="text"/>
</div>
<!-- Generic Name Input -->
<div class="flex flex-col gap-sm">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="generic-name">الاسم العام</label>
<input class="input-radius border-border focus:border-primary focus:ring-1 focus:ring-primary w-full p-3 font-body-md text-body-md bg-surface text-on-surface placeholder:text-text-hint transition-colors outline-none shadow-sm" id="generic-name" placeholder="أدخل الاسم العام (مثل: باراسيتامول)" type="text"/>
</div>
<!-- Category Select -->
<div class="flex flex-col gap-sm">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="category">الفئة</label>
<div class="relative">
<select class="input-radius border-border focus:border-primary focus:ring-1 focus:ring-primary w-full p-3 pr-4 pl-10 font-body-md text-body-md bg-surface text-on-surface appearance-none outline-none shadow-sm cursor-pointer" id="category">
<option class="text-text-hint" disabled="" selected="" value="">اختر الفئة</option>
<option value="antibiotic">مضاد حيوي</option>
<option value="analgesic">مسكن ألم</option>
<option value="vitamin">فيتامين</option>
<option value="antacid">مضاد حموضة</option>
<option value="other">أخرى</option>
</select>
<div class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Active Ingredient Input (Optional) -->
<div class="flex flex-col gap-sm mb-4">
<div class="flex justify-between items-center">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="active-ingredient">المادة الفعالة</label>
<span class="font-caption text-caption text-text-hint">اختياري</span>
</div>
<input class="input-radius border-border focus:border-primary focus:ring-1 focus:ring-primary w-full p-3 font-body-md text-body-md bg-surface text-on-surface placeholder:text-text-hint transition-colors outline-none shadow-sm" id="active-ingredient" placeholder="أدخل المادة الفعالة" type="text"/>
</div>
</div>
<!-- Sticky Bottom Action Area -->
<div class="p-md border-t border-border bg-surface rounded-t-[24px]">
<button class="w-full btn-radius bg-primary-container text-on-primary font-headline-sm text-headline-sm py-3.5 px-6 flex items-center justify-center gap-2 hover:bg-primary transition-colors active:scale-[0.98] shadow-[0_4px_16px_rgba(26,107,138,0.25)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                حفظ الدواء
            </button>
</div>
</div>
<!-- Initialization Script -->
<script>
        // Simple initialization for aesthetics only
        document.addEventListener('DOMContentLoaded', () => {
            const sheet = document.getElementById('bottom-sheet');
            // Animate in
            sheet.classList.remove('translate-y-full');
        });
    </script>
</body></html>
