<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md antialiased min-h-screen relative pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface flex justify-between items-center w-full px-screen-edge-h h-16 fixed top-0 z-40 transition-colors duration-200">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-light flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-sm" data-icon="person">person</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">المصروفات</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-text-secondary dark:text-outline hover:bg-surface-container-low dark:hover:bg-surface-variant transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="pt-20 px-screen-edge-h flex flex-col gap-lg max-w-3xl mx-auto">
<!-- Summary Card -->
<section class="bg-primary text-on-primary rounded-xl p-lg shadow-[0_4px_24px_rgba(26,107,138,0.2)] flex flex-col gap-sm relative overflow-hidden">
<div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
<div class="absolute -bottom-10 -left-10 w-24 h-24 bg-white/5 rounded-full blur-xl"></div>
<h2 class="font-body-md text-on-primary/80 z-10">إجمالي المصروفات (هذا الشهر)</h2>
<div class="flex items-baseline gap-xs z-10">
<span class="font-data-numeric text-[32px] leading-none tracking-tight">22,200</span>
<span class="font-body-md text-on-primary/80">ر.س</span>
</div>
</section>
<!-- Filters -->
<section>
<div class="flex overflow-x-auto gap-sm pb-2 hide-scrollbar">
<button class="shrink-0 bg-primary-light text-primary font-label-chip text-label-chip px-4 py-2 rounded-full border border-primary/20 transition-colors">الكل</button>
<button class="shrink-0 bg-surface text-text-secondary font-label-chip text-label-chip px-4 py-2 rounded-full border border-border hover:bg-surface-container-low transition-colors">إيجار</button>
<button class="shrink-0 bg-surface text-text-secondary font-label-chip text-label-chip px-4 py-2 rounded-full border border-border hover:bg-surface-container-low transition-colors">رواتب</button>
<button class="shrink-0 bg-surface text-text-secondary font-label-chip text-label-chip px-4 py-2 rounded-full border border-border hover:bg-surface-container-low transition-colors">مستلزمات طبية</button>
<button class="shrink-0 bg-surface text-text-secondary font-label-chip text-label-chip px-4 py-2 rounded-full border border-border hover:bg-surface-container-low transition-colors">صيانة</button>
</div>
</section>
<!-- Expenses List -->
<section class="flex flex-col gap-md">
<!-- Item 1 -->
<div class="bg-surface rounded-xl p-md shadow-[0_1px_3px_rgba(0,0,0,0.08)] flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="home_work">home_work</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<h3 class="font-headline-sm text-headline-sm text-text-primary">إيجار العيادة - مارس</h3>
<p class="font-caption text-caption text-text-hint">15 مارس 2024</p>
</div>
<div class="flex flex-col items-end gap-1 shrink-0">
<span class="font-data-numeric text-data-numeric text-error font-bold">- 5,000</span>
</div>
</div>
<!-- Item 2 -->
<div class="bg-surface rounded-xl p-md shadow-[0_1px_3px_rgba(0,0,0,0.08)] flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="groups">groups</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<h3 class="font-headline-sm text-headline-sm text-text-primary">رواتب طاقم التمريض</h3>
<p class="font-caption text-caption text-text-hint">01 مارس 2024</p>
</div>
<div class="flex flex-col items-end gap-1 shrink-0">
<span class="font-data-numeric text-data-numeric text-error font-bold">- 12,500</span>
</div>
</div>
<!-- Item 3 -->
<div class="bg-surface rounded-xl p-md shadow-[0_1px_3px_rgba(0,0,0,0.08)] flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="medical_services">medical_services</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<h3 class="font-headline-sm text-headline-sm text-text-primary">شراء أدوية ومستلزمات</h3>
<p class="font-caption text-caption text-text-hint">10 مارس 2024</p>
</div>
<div class="flex flex-col items-end gap-1 shrink-0">
<span class="font-data-numeric text-data-numeric text-error font-bold">- 3,200</span>
</div>
</div>
<!-- Item 4 -->
<div class="bg-surface rounded-xl p-md shadow-[0_1px_3px_rgba(0,0,0,0.08)] flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="build">build</span>
</div>
<div class="flex-1 flex flex-col gap-1">
<h3 class="font-headline-sm text-headline-sm text-text-primary">صيانة جهاز الأشعة</h3>
<p class="font-caption text-caption text-text-hint">05 مارس 2024</p>
</div>
<div class="flex flex-col items-end gap-1 shrink-0">
<span class="font-data-numeric text-data-numeric text-error font-bold">- 1,500</span>
</div>
</div>
</section>
</main>
<!-- Floating Action Button (FAB) -->
<button class="fixed bottom-lg left-lg w-[56px] h-[56px] bg-primary text-on-primary rounded-2xl flex items-center justify-center shadow-[0_4px_16px_rgba(26,107,138,0.35)] hover:scale-105 active:scale-95 transition-transform z-50">
<span class="material-symbols-outlined text-[24px]" data-icon="add">add</span>
</button>
</body></html>
