<!-- MAIN CONTENT BACKGROUND -->
<main class="p-md space-y-md pb-24 max-w-screen-xl mx-auto">
<div class="flex justify-between items-center mb-md">
<h1 class="text-2xl font-bold text-text-primary">الفواتير</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md opacity-40 select-none pointer-events-none">
<div class="bg-surface p-md rounded-2xl shadow-sm border border-border">

<div>

<!-- STATE 1: EMPTY STATE BOTTOM SHEET (SEARCH FIELD) -->

<div class="bg-surface w-full max-w-lg rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.12)] p-md flex flex-col space-y-md">
<!-- 1. Handle bar -->
<div class="flex justify-center -mt-2 pb-4">
<div class="w-8 h-1 bg-border rounded-full"></div>
</div>
<!-- 2. Header with X button on left -->

<button class="p-2 rounded-full hover:bg-surface-container transition-colors" onclick="toggleSheet('state-empty', null)">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h2 class="text-lg font-bold text-text-primary">تسجيل فاتورة</h2>
<div class="w-10"></div>
</div>
<!-- Scrollable Content -->
<div class="space-y-md overflow-y-auto max-h-[70vh]">
<!-- 3. Patient Selection (Search State) -->
<div class="space-y-2">
<label class="text-sm font-bold text-text-primary pr-1">المريض</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-3 text-text-hint">search</span>
<input class="w-full h-12 pr-10 pl-4 bg-surface-bright border border-border rounded-[10px] focus:border-primary focus:ring-0 text-sm outline-none transition-all" placeholder="ابحث باسم المريض أو رقمه" type="text">
</div>
</div>
<!-- 4. Appointment Selection -->
<div class="space-y-2">
<label class="text-sm font-bold text-text-primary pr-1">الموعد</label>
<div class="relative flex items-center">
<select class="w-full h-12 px-4 bg-surface-bright border border-border rounded-[10px] focus:border-primary focus:ring-0 text-sm outline-none appearance-none transition-all">

</select>
<span class="material-symbols-outlined absolute left-3 text-text-hint pointer-events-none">expand_more</span>
</div>
<div class="flex items-center gap-1.5 text-text-secondary pr-1">

<span class="text-xs">يظهر فقط المواعيد المنتهية</span>
</div>
</div>
<!-- 6 & 7. Amount Fields -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-2">
<label class="text-sm font-bold text-text-primary">المبلغ الإجمالي</label>
<div class="relative flex items-center">
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-border rounded-[10px] number-font outline-none" placeholder="0" type="text">
<span class="absolute left-3 text-xs text-text-secondary font-bold">ج.م</span>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-bold text-text-primary">المبلغ المدفوع</label>
<div class="relative flex items-center">
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-border rounded-[10px] number-font outline-none" type="text" value="0">
<span class="absolute left-3 text-xs text-text-secondary font-bold">ج.م</span>
</div>
</div>
</div>
<!-- 8. Payment Method Chips -->
<div class="space-y-3">
<label class="text-sm font-bold text-text-primary">طريقة الدفع</label>
<div class="flex gap-2">
<button class="flex items-center gap-2 px-4 py-2 border border-border rounded-full text-sm text-text-secondary hover:border-primary hover:text-primary transition-all">
<span class="text-[18px]">💵</span> نقد
                        </button>
<button class="flex items-center gap-2 px-4 py-2 border border-border rounded-full text-sm text-text-secondary hover:border-primary hover:text-primary transition-all">

                        </button>

<span class="text-[18px]">🔄</span> تحويل
                        </button>
</div>
</div>
</div>
<!-- 9. Save Button -->
<div class="pt-4">
<button class="w-full h-14 bg-surface-container-high text-text-hint rounded-xl font-bold text-lg cursor-not-allowed" disabled="">

<!-- 8. Payment Method Chips -->
<div class="space-y-3">
<label class="text-sm font-bold text-text-primary">طريقة الدفع</label>
<div class="flex gap-2">
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-full text-sm font-bold shadow-md">
<span class="text-[18px]">💵</span> نقد

<button class="flex items-center gap-2 px-4 py-2 border border-border rounded-full text-sm text-text-secondary hover:bg-surface-container-low transition-all">
<span class="text-[18px]">💳</span> بطاقة
                        </button>

                        </button>

<!-- 9. Save Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg hover:opacity-95 active:scale-[0.98] transition-all">

</div>

<!-- BOTTOM NAVBAR -->

<a class="flex flex-col items-center justify-center text-text-secondary px-4 py-1" href="#"><span class="material-symbols-outlined">groups</span><span class="text-[11px]">المرضى</span></a>
<a class="flex flex-col items-center justify-center text-text-secondary px-4 py-1" href="#"><span class="material-symbols-outlined">settings</span><span class="text-[11px]">الإعدادات</span></a>
</nav>
<script>
        function toggleSheet(currentId, targetId) {
            const allSheets = ['state-empty', 'state-partial'];
            allSheets.forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            if (targetId) {
                document.getElementById(targetId).classList.remove('hidden');
            }
        }

        // Close on overlay click
        document.querySelectorAll('.bottom-sheet-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.add('hidden');
                }
            });
        });
    </script>
