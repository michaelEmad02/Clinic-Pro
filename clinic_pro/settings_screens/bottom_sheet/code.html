<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Toggle Logic
            const toggles = document.querySelectorAll('.day-toggle');
            toggles.forEach(toggle => {
                toggle.addEventListener('change', function() {
                    const parent = this.closest('.day-row');
                    const timeContainer = parent.querySelector('.time-slots-container');
                    const addBtn = parent.querySelector('.add-period-btn');
                    const statusText = parent.querySelector('.text-caption');
                    const iconBox = parent.querySelector('.w-10');
                    const dayLabel = parent.querySelector('.font-headline-sm');

                    if (this.checked) {
                        parent.classList.remove('opacity-60', 'bg-surface-container-lowest');
                        if(timeContainer) timeContainer.classList.remove('hidden');
                        if(addBtn) addBtn.classList.remove('hidden');
                        if(statusText && statusText.innerText.includes('مغلق')) statusText.classList.add('hidden');
                        if(iconBox) iconBox.className = "w-10 h-10 rounded-xl bg-primary-light flex items-center justify-center";
                        if(dayLabel) dayLabel.classList.remove('text-text-secondary');
                    } else {
                        parent.classList.add('opacity-60', 'bg-surface-container-lowest');
                        if(timeContainer) timeContainer.classList.add('hidden');
                        if(addBtn) addBtn.classList.add('hidden');
                        if(!statusText || !statusText.innerText.includes('مغلق')) {
                            const newStatus = document.createElement('p');
                            newStatus.className = "text-caption text-text-hint";
                            newStatus.innerText = "يوم مغلق - لا يوجد مواعيد";
                            parent.appendChild(newStatus);
                        } else {
                            statusText.classList.remove('hidden');
                        }
                        if(iconBox) iconBox.className = "w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center";
                        if(dayLabel) dayLabel.classList.add('text-text-secondary');
                    }
                });
            });

            // Add Period Logic (Mock Implementation)
            const addButtons = document.querySelectorAll('.add-period-btn');
            addButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const container = this.closest('.day-row').querySelector('.time-slots-container');
                    const newPeriod = document.createElement('div');
                    newPeriod.className = "flex items-center gap-md pt-sm border-t border-dashed border-border mt-sm group animate-in fade-in slide-in-from-top-1";
                    newPeriod.innerHTML = `
                        <div class="flex-1">
                            <label class="block text-caption text-text-hint mb-1">من</label>
                            <input type="time" value="17:00" class="w-full bg-surface-container-low border-none rounded-xl px-md py-3 font-data-numeric text-primary">
                        </div>
                        <div class="flex-1">
                            <label class="block text-caption text-text-hint mb-1">إلى</label>
                            <input type="time" value="20:00" class="w-full bg-surface-container-low border-none rounded-xl px-md py-3 font-data-numeric text-primary">
                        </div>
                        <button class="mt-6 p-2 text-danger hover:bg-danger-bg rounded-lg transition-colors opacity-0 group-hover:opacity-100 delete-period">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    `;
                    container.appendChild(newPeriod);
                    
                    // Add delete listener
                    newPeriod.querySelector('.delete-period').addEventListener('click', function() {
                        newPeriod.remove();
                    });
                });
            });
        });
    </script>
